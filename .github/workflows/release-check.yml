name: Release Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  release-check:
    name: Release check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify release
        run: pnpm verify:release

      - name: Upload retained verification directory
        if: failure() && env.VERIFY_RELEASE_RETAINED_DIR != ''
        uses: actions/upload-artifact@v4
        with:
          name: verify-release-failure-${{ matrix.os }}
          path: ${{ env.VERIFY_RELEASE_RETAINED_DIR }}
          if-no-files-found: ignore
