name: Release Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-check:
    name: Release check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run release check
        run: pnpm release:check
